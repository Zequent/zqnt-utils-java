}

// ========== SHARED COORDINATE AND CONTROL MESSAGES ==========

message Coordinates {
  double latitude = 1;
  double longitude = 2;
  double altitude = 3;
}



message ReturnToHomeRequest{
  optional float altitude = 1;
}



message ManualControlRequest{
  string clientId = 1;
  string userId = 2;
  optional string reason = 3;
  string sessionId = 4;
}

message ManualControlInput{
  optional float roll = 1;
  optional float pitch = 2;
  optional float yaw = 3;
  optional float throttle = 4;
  optional float gimbalPitch = 5;
}


message LiveStreamState{
  string videoId = 1;
  string streamUrl = 2;
  bool isLive = 3;
  google.protobuf.Timestamp startedAt = 4;
  AssetTypeEnum assetType = 5;
  //bool isAvailable = 6;
}
message LiveStreamStartResponse {
  string streamUrl = 1;
  string videoId = 2;
}
message ChangeCameraLensRequest{
  optional string lens = 1;
}

message ChangeCameraZoomRequest{
  optional string lens = 1;
  optional int32 zoom = 2;
}

message DetectionControlRequest{
  enum DetectionControlCommand{
    DETECTION_START = 0;
    DETECTION_STOP = 1;
  }
  DetectionControlCommand command = 1;
  optional string assetSn = 2;
  optional string subAssetSn = 3;
  optional string taskId = 4;
  optional string streamUrl = 5;
  optional bool gimbalTrackingEnabled = 6;
}

message CommandProgress{
  float progress = 1;
  string state = 2;
  float leftTimeInSeconds = 3;
}

message ManualControlState {
  ManualControlStateEnum state = 1;
  string sn = 2;
  optional string assetId = 3;
  bool active = 4;
  string clientId = 5;
  string userId = 6;
  string sessionId = 7;
}

message RequestBase {
  string tid = 1;           // Transaction ID
  string sn = 2;            // Serial Number / Asset Serial Number
  google.protobuf.Timestamp timestamp = 3;
}


message AssetProtoDTO{
  string id = 1;
  string sn = 2;
  string name = 3;
  AssetTypeEnum type = 4;
  AssetVendor vendor = 5;
  AssetConnection connection = 6;
  optional string connectionString = 7;
  string model = 8;
  optional int32 port = 9;
  optional string liveStreamServer = 10;
  optional string externalDeviceType = 11;
  optional string externalDeviceSubType = 12;
  string organization = 13;
  bool online = 14;
  optional SubAssetProtoDTO subAssetDTO = 15;
  optional string externalId = 16;
  LiveStreamTypeEnum streamType = 17;
}

message SubAssetProtoDTO{
  string id = 1;
  string sn = 2;
  string name = 3;
  AssetTypeEnum type = 4;
  AssetVendor vendor = 5;
  AssetConnection connection = 6;
  optional string connectionString = 7;
  string model = 8;
  optional int32 port = 9;
  optional string liveStreamServer = 10;
  optional string externalDeviceType = 11;
  optional string externalDeviceSubType = 12;
  string organization = 13;
  bool online = 14;
  optional string externalId = 15;
  LiveStreamTypeEnum streamType = 16;
  optional bool streamUrlPredefined = 17;
}

message OrganizationProtoDTO{
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string assets = 4;
}

message MissionProtoDTO{
  optional string id = 1;
  string name = 2;
  string description = 3;
  repeated TaskProtoDTO tasks = 4;
  MissionStatus status = 5;
  MissionType type = 6;
  optional string geoJson = 7;
  optional google.protobuf.Timestamp startDate = 8;
  optional google.protobuf.Timestamp endDate = 9;
  repeated string assignedAssets = 10;
  optional google.protobuf.Timestamp createdAt = 11;
  optional google.protobuf.Timestamp modifiedAt = 12;
  optional string updatedUser = 13;
}


// POJO-aligned task DTO with type-safe config payload.
message TaskProtoDTO{
  optional string id = 1;
  optional string missionId = 2;
  optional google.protobuf.Timestamp createdAt = 35;
  optional google.protobuf.Timestamp modifiedAt = 38;
  optional string modifiedFrom = 39;
  optional string name = 3;
  optional string description = 4;
  optional TaskTypeProto taskType = 5;

  // Deprecated JSON string config - use taskConfig instead
  optional string config = 6 [deprecated = true];

  TaskStatus status = 7;
  optional string assetId = 8;
  optional string snNumber = 9;
  optional int32 currentProgress = 10;
  optional string currentStep = 11;
  optional FlighttaskBreakReasonEnumProto breakReason = 12;

  // Type-safe task configuration (replaces config field)
  oneof taskConfig {
    WaypointTaskConfigProto waypointConfig = 50;
    DetectTaskConfigProto detectConfig = 51;
    AreaMappingTaskConfigProto areaMappingConfig = 52;
    PoiTaskConfigProto poiConfig = 53;
    FollowTaskConfigProto followConfig = 54;
    TrackTaskConfigProto trackConfig = 55;
  }

}


message WaypointProtoDTO{
  double latitude = 1;
  double longitude = 2;
  optional float altitude = 3;
  optional float speed = 4;
  optional bool flyTrough = 5;
  optional VehicleAction vehicleAction = 6;
  optional int32 wpOrder = 7;
  optional int32 gimbalPitch = 8;
}

message SchedulerProtoDTO{
  optional string id = 1;
  string name = 2;
  optional string missionId = 3;
  optional string taskId = 4;
  string cronExpression = 5;
  optional bool active = 6;
  SchedulerType type = 7;
  optional string clientTimeZone = 8;
  optional google.protobuf.Timestamp createdAt = 9;
  optional google.protobuf.Timestamp modifiedAt = 10;
}

message SchedulerProtoDTOList{
  repeated SchedulerProtoDTO schedulerDTOList= 1;
}

// ========== TASK CONFIG MESSAGES (Type-safe configs matching POJOs) ==========

// Waypoint task configuration - mirrors WaypointTaskConfig.java
message WaypointTaskConfigProto {
  string flightId = 1;
  repeated WaypointProtoDTO waypoints = 2;
  optional FlyToWaylineModeProto flyToWaylineMode = 3;
  optional WaylineFinishActionProto waylineFinishAction = 4;
  optional WaylineTypeEnumProto waylineType = 5;
  optional WaylineTurnModeProto waylineTurnMode = 6;
  optional bool useStraightLine = 7;
  optional WaylinePrecisionTypeEnumProto waylinePrecisionType = 8;
  optional ExitWaylineWhenRcLostEnumProto exitWaylineWhenRcLostEnum = 9;
  optional RcLostActionEnumProto rcLostActionEnum = 10;
  optional OutOfControlActionEnumProto outOfControlAction = 11;
  optional float takeOffSecurityHeight = 12;
  optional int32 rthAltitude = 13;
  optional RthModeEnumProto rthMode = 14;
  optional float rthSpeed = 15;
  optional float globalSpeed = 16;
  optional float globalTransitionSpeed = 17;
  optional float globalHeight = 18;
  optional WaylineGimbalPitchModeProto gimbalPitchMode = 19;
  optional int32 globalGimbalPitch = 20;
  optional string payloadImagingType = 21;
  optional string fileUrl = 22;
  optional string fileMd5 = 23;
  optional string flightAreaFileUrl = 24;
  optional string flightAreaChecksum = 25;
}

// Detect task configuration - mirrors DetectTaskConfig.java
message DetectTaskConfigProto {
  repeated string detectionTargets = 1;
  optional string detectionMode = 2;
  optional double areaLatitude = 3;
  optional double areaLongitude = 4;
  optional float areaRadius = 5;
  optional float detectionAltitude = 6;
  optional string scanPattern = 7;
  optional float scanSpeed = 8;
  optional bool thermalDetection = 9;
  optional bool visualDetection = 10;
  optional float minConfidence = 11;
  optional int32 maxDetections = 12;
  optional bool autoCaptureOnDetection = 13;
  optional bool investigateDetections = 14;
  optional float investigationDistance = 15;
  optional int32 investigationDuration = 16;
  optional int32 gimbalPitch = 17;
  optional bool enableZoom = 18;
  optional float zoomLevel = 19;
  optional int32 maxDuration = 20;
  optional string onMaxDetectionsAction = 21;
  optional bool realtimeAlerts = 22;
  optional string aiModelId = 23;
  repeated DetectionParameterProto detectionParameters = 24;

  message DetectionParameterProto {
    string name = 1;
    string value = 2;
    optional string description = 3;
  }
}

// Area mapping task configuration - mirrors AreaMappingTaskConfig.java
message AreaMappingTaskConfigProto {
  repeated AreaVertexProto areaVertices = 1;
  float surveyAltitude = 2;
  optional string flightPattern = 3;
  optional int32 frontOverlap = 4;
  optional int32 sideOverlap = 5;
  optional float speed = 6;
  optional int32 gimbalPitch = 7;
  optional int32 cameraAngle = 8;
  optional bool terrainFollowing = 9;
  optional float groundSamplingDistance = 10;
  optional bool enable3DReconstruction = 11;

  message AreaVertexProto {
    double latitude = 1;
    double longitude = 2;
    optional int32 order = 3;
  }
}

// POI task configuration - mirrors PoiTaskConfig.java
message PoiTaskConfigProto {
  double poiLatitude = 1;
  double poiLongitude = 2;
  float poiAltitude = 3;
  optional float orbitRadius = 4;
  optional float orbitSpeed = 5;
  optional float flightAltitude = 6;
  optional int32 numberOfOrbits = 7;
  optional string orbitDirection = 8;
  optional int32 startAngle = 9;
  optional int32 endAngle = 10;
  optional bool captureEnabled = 11;
  optional int32 captureInterval = 12;
  optional bool lockCameraOnPoi = 13;
}

// Follow task configuration - mirrors FollowTaskConfig.java
message FollowTaskConfigProto {
  string targetType = 1;
  optional double initialLatitude = 2;
  optional double initialLongitude = 3;
  optional float followDistance = 4;
