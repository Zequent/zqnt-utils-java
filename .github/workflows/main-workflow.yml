name: Main Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -B clean package -Dquarkus.container-image.build=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
