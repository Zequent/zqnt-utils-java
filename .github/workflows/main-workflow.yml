name: Main Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:

  test-and-build-java:
    name: Test & Build Java Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build all Java modules (resolve local dependencies)
        run: mvn -B clean package -Dquarkus.container-image.build=false

  publish-java:
    name: Publish Selected Java SDKs
    runs-on: ubuntu-latest
    needs: test-and-build-java
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Publish to GitHub Packages
        run: mvn -B deploy --settings .github/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  buf:
    name: Buf Lint & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Get version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          input: .
          format: false
          lint: false
          breaking: false
          push: false

      - name: Push to BSR with label
        run: buf push . --label ${{ steps.version.outputs.value }}
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
