name: Pull Request Workflow

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  pull-requests: write  # Required for commenting on PRs
  issues: write  # Required for issue comments

jobs:
  test-java:
    name: Test & Build Java Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run tests and build
        run: mvn -B clean test -Dquarkus.container-image.build=false --settings .github/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  publish-preview:
    name: Publish Preview Version
    runs-on: ubuntu-latest
    needs: test-java
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate preview version
        id: version
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          PR_NUMBER=${{ github.event.pull_request.number }}
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')

          # Preview version: 1.0.0-PR123-abc1234-SNAPSHOT
          PREVIEW_VERSION="${BASE_VERSION}-PR${PR_NUMBER}-${COMMIT_SHA}-SNAPSHOT"

          echo "version=${PREVIEW_VERSION}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

          echo "📦 Preview version: ${PREVIEW_VERSION}"

      - name: Update version in pom.xml
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.version }}

      - name: Publish preview to GitHub Packages
        run: mvn -B deploy --settings .github/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const commitSha = '${{ steps.version.outputs.commit_sha }}';

            const comment = `### 🎯 Preview Version Published

            A preview version has been published to GitHub Packages:

            **Version:** \`${version}\`
            **Commit:** \`${commitSha}\`

            #### 📦 Use this version in your project:

            \`\`\`xml
            <dependency>
                <groupId>com.zqnt</groupId>
                <artifactId>zqnt-utils</artifactId>
                <version>${version}</version>
            </dependency>
            \`\`\`

            #### ⚠️ Note
            This is a preview version for testing purposes. It will be replaced by the final version when this PR is merged.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

